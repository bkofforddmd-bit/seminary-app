const DM_BOOKS = ["Old Testament", "New Testament", "Book of Mormon", "Doctrine and Covenants"];

function shuffle(a) {
  const r = [...a];
  for (let i = r.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
}

function buildPool(secs) {
  const arr = [];
  DM_BOOKS.forEach(b => {
    if (secs[b+'_first'])  SD[b].firstHalf.forEach(it => arr.push({...it, book:b}));
    if (secs[b+'_second']) SD[b].secondHalf.forEach(it => arr.push({...it, book:b}));
  });
  return arr;
}

let currentPool = [];
let currentQ = null;
let onCorrect = null;
let onWrong = null;

function makeQ(passage) {
  const others = shuffle(currentPool.filter(p => p.ref !== passage.ref));
  const opts = shuffle([passage, ...others.slice(0, 3)]);
  return { passage, opts, correctIdx: opts.findIndex(o => o.ref === passage.ref) };
}

function showToast(msg, ok) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.background = ok ? '#2a6644' : '#c04030';
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = 'none', 2500);
}

function renderSectionPicker(onPick) {
  const secs = {};
  const div = document.createElement('div');
  div.className = 'screen';
  
  function getCount() { return buildPool(secs).length; }
  
  div.innerHTML = \`

    </div>
    <button class="btn-brown" id="cont-btn" disabled style="opacity:.5;cursor:not-allowed">Continue →</button>
  \`;
  
  const bookList = div.querySelector('#book-list');
  DM_BOOKS.forEach(book => {
    const bc = BC[book];
    const bookDiv = document.createElement('div');
    bookDiv.className = 'card';
    bookDiv.innerHTML = \`
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <div style="width:7px;height:7px;border-radius:50%;background:\${bc.dot}"></div>
        <span style="font-family:Georgia,serif;font-weight:700;font-size:13px">\${book}</span>
      </div>
      <div style="display:flex;gap:6px">
        <button class="section-btn" data-book="\${book}" data-half="first" style="border-color:\${bc.border}">
          <span>1st Half</span><span style="background:#e8dfc8;border-radius:99px;padding:1px 5px;font-size:10.5px">\${SD[book].firstHalf.length}</span>
        </button>
        <button class="section-btn" data-book="\${book}" data-half="second" style="border-color:\${bc.border}">
          <span>2nd Half</span><span style="background:#e8dfc8;border-radius:99px;padding:1px 5px;font-size:10.5px">\${SD[book].secondHalf.length}</span>
        </button>
      </div>
    \`;
    bookList.appendChild(bookDiv);
  });
  
  function update() {
    const n = getCount();
    div.querySelector('#pool-count').textContent = n + ' scriptures';
    div.querySelector('#pool-count').style.background = n > 0 ? '#2c1a0e' : '#c8bfaa';
    const btn = div.querySelector('#cont-btn');
    btn.disabled = n < 4;
    btn.style.opacity = n < 4 ? '.5' : '1';
    btn.style.cursor = n < 4 ? 'not-allowed' : 'pointer';
  }
  
  div.addEventListener('click', e => {
    const btn = e.target.closest('[data-book]');
    if (!btn) return;
    const key = btn.dataset.book + '_' + btn.dataset.half;
    const bc = BC[btn.dataset.book];
    if (secs[key]) {
      delete secs[key];
      btn.classList.remove('on');
      btn.style.background = '#f7f5f0';
      btn.style.color = '#7a6040';
      btn.querySelectorAll('span')[1].style.background = '#e8dfc8';
    } else {
      secs[key] = true;
      btn.classList.add('on');
      btn.style.background = bc.bg;
      btn.style.color = bc.accent;
      btn.style.borderColor = bc.border;
      btn.querySelectorAll('span')[1].style.background = bc.dot + '55';
    }
    update();
  });
  
  div.querySelector('#cont-btn').addEventListener('click', () => {
    if (getCount() >= 4) {
      currentPool = buildPool(secs);
      onPick();
    }
  });
  
  return div;
}

function showQuestion(passage, teamName, teamColor, onC, onW) {
  currentQ = makeQ(passage);
  onCorrect = onC;
  onWrong = onW;
  
  let overlay = document.getElementById('q-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'q-overlay';
    overlay.className = 'q-overlay';
    document.body.appendChild(overlay);
  }
  
  overlay.innerHTML = \`
    <div class="q-modal">
      <div class="q-header" style="background:\${teamColor}">
        <span>\${teamName ? teamName+"'s turn" : 'Question'}</span>
        <button onclick="hideQuestion()">✕</button>
      </div>
      <div class="q-body">
        <div class="q-label">Scripture Reference</div>
        <div class="q-ref">\${passage.ref}</div>
        <div class="q-label">Select the matching key phrase:</div>
        \${currentQ.opts.map((opt,i) => \`<button class="q-opt" onclick="pickAnswer(\${i})"><span style="font-weight:700;margin-right:6px;color:#7a6040">\${String.fromCharCode(65+i)}.</span>\${opt.phrase}</button>\`).join('')}
      </div>
    </div>
  \`;
  overlay.style.display = 'flex';
}

function hideQuestion() {
  const o = document.getElementById('q-overlay');
  if (o) o.style.display = 'none';
}

function pickAnswer(idx) {
  if (!currentQ) return;
  const btns = document.querySelectorAll('.q-opt');
  btns.forEach(b => b.onclick = null);
  btns[currentQ.correctIdx].classList.add('correct');
  if (idx !== currentQ.correctIdx) btns[idx].classList.add('wrong');
  
  const correct = idx === currentQ.correctIdx;
  const q = currentQ;
  currentQ = null;
  setTimeout(() => {
    hideQuestion();
    if (correct) onCorrect && onCorrect();
    else onWrong && onWrong(q.passage);
  }, 1200);
}

const DM_BOOKS = ["Old Testament", "New Testament", "Book of Mormon", "Doctrine and Covenants"];

function shuffle(a) {
  const r = [...a];
  for (let i = r.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
}

function buildPool(secs) {
  const arr = [];
  DM_BOOKS.forEach(b => {
    if (secs[b+'_first'])  SD[b].firstHalf.forEach(it => arr.push({...it, book:b}));
    if (secs[b+'_second']) SD[b].secondHalf.forEach(it => arr.push({...it, book:b}));
  });
  return arr;
}

let currentPool = [];
let currentQ = null;
let onCorrect = null;
let onWrong = null;

function makeQ(passage) {
  const others = shuffle(currentPool.filter(p => p.ref !== passage.ref));
  const opts = shuffle([passage, ...others.slice(0, 3)]);
  return { passage, opts, correctIdx: opts.findIndex(o => o.ref === passage.ref) };
}

function showToast(msg, ok) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.background = ok ? '#2a6644' : '#c04030';
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = 'none', 2500);
}

function showQuestion(passage, teamName, teamColor, onC, onW) {
  currentQ = makeQ(passage);
  onCorrect = onC;
  onWrong = onW;
  
  let overlay = document.getElementById('q-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'q-overlay';
    overlay.className = 'q-overlay';
    document.body.appendChild(overlay);

  overlay.innerHTML = \`

      </div>

  \`;
  overlay.style.display = 'flex';
}

function hideQuestion() {
  const o = document.getElementById('q-overlay');
  if (o) o.style.display = 'none';
}

function pickAnswer(idx) {
  if (!currentQ) return;
  const btns = document.querySelectorAll('.q-opt');
  btns.forEach(b => b.onclick = null);
  btns[currentQ.correctIdx].classList.add('correct');
  if (idx !== currentQ.correctIdx) btns[idx].classList.add('wrong');
  
  const correct = idx === currentQ.correctIdx;
  const q = currentQ;
  currentQ = null;
  setTimeout(() => {
    hideQuestion();
    if (correct) onCorrect && onCorrect();
    else onWrong && onWrong(q.passage);
  }, 1200);
}


const ROWS=6,COLS=7;
const C4C=['#e05c30','#f0c030'];
let phase='sections',names=['Red','Yellow'],grid=null,passPool=[],passIdx=0;
let current=0,scores=[0,0],winner=null,winCells=[],hover=-1;

function initGrid(){return Array(ROWS).fill(null).map(()=>Array(COLS).fill(null));}
function startGame(){grid=initGrid();passPool=shuffle(currentPool);passIdx=0;current=0;winner=null;winCells=[];phase='play';render();}
function checkWin(g,r,c,p){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(const[dr,dc]of dirs){
    let cells=[[r,c]];
    for(let d=1;d<4;d++){const nr=r+dr*d,nc=c+dc*d;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&g[nr][nc]===p)cells.push([nr,nc]);else break;}
    for(let d=1;d<4;d++){const nr=r-dr*d,nc=c-dc*d;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&g[nr][nc]===p)cells.push([nr,nc]);else break;}
    if(cells.length>=4){winCells=cells;return true;}
  }
  return false;
}

function dropCol(col){
  let row=-1;for(let r=ROWS-1;r>=0;r--){if(grid[r][col]===null){row=r;break;}}
  if(row===-1)return;
  const passage=passPool[passIdx%passPool.length];
  showQuestion(passage,names[current],C4C[current],
    ()=>{
      passIdx++;
      // Animate token drop before placing
      animateDrop(col, row, current, ()=>{
        const ng=grid.map(r=>[...r]);ng[row][col]=current;grid=ng;
        const won=checkWin(ng,row,col,current);const full=ng[0].every(c=>c!==null);
        if(won){winner=current;scores[current]++;phase='end';}else if(full){winner='draw';phase='end';}else current=1-current;
        showToast('✓ Correct!',true);render();
      });
    },
    (p)=>{passIdx++;current=1-current;showToast('✗ '+p.ref,false);render();}
  );
}

function animateDrop(col, targetRow, player, onDone) {
  // Flash each row as the token "falls" into place
  const cs = Math.min(44, Math.floor((Math.min(window.innerWidth||360,500)-28)/COLS));
  let animRow = -1; // start above grid
  const totalRows = targetRow + 1;
  const stepMs = Math.max(60, Math.round(280 / totalRows));

  // Add a floating token indicator above the grid
  const indicator = document.createElement('div');
  indicator.id = '_drop_token';
  indicator.style.cssText = 'position:fixed;width:'+(cs-4)+'px;height:'+(cs-4)+'px;border-radius:50%;background:'+C4C[player]+';z-index:999999;pointer-events:none;box-shadow:0 3px 12px rgba(0,0,0,.4);transition:top '+stepMs+'ms linear';
  document.body.appendChild(indicator);

  // Find the target cell position
  function getCellRect(r, c) {
    const rows = document.querySelectorAll('#grid-rows .c4-row');
    if (!rows[r]) return null;
    const cells = rows[r].querySelectorAll('.c4-cell');
    return cells[c] ? cells[c].getBoundingClientRect() : null;
  }

  // Start from top of column (row 0)
  const startRect = getCellRect(0, col);
  if (!startRect) { onDone(); return; }

  indicator.style.left = (startRect.left + 2) + 'px';
  indicator.style.top = (startRect.top - cs - 4) + 'px';

  let curRow = 0;
  function step() {
    if (curRow > targetRow) {
      indicator.remove();
      onDone();
      return;
    }
    const rect = getCellRect(curRow, col);
    if (rect) indicator.style.top = (rect.top + 2) + 'px';
    curRow++;
    setTimeout(step, stepMs);
  }
  setTimeout(step, 30);
}

      <div style="display:flex;gap:12px;justify-content:center;margin-bottom:20px">
        \${[0,1].map(i=>\`<div style="text-align:center;background:\${C4C[i]};color:#fff;border-radius:10px;padding:10px 20px"><div style="font-size:11px;margin-bottom:2px">\${names[i]}</div><div style="font-size:26px;font-weight:700">\${scores[i]}</div></div>\`).join('')}

      </div></div>\`;
    return;
  }
  const cs=Math.min(44,Math.floor((Math.min(window.innerWidth,500)-28)/COLS));
  app.innerHTML=\`<div class="screen">
    <div style="display:flex;gap:7px;margin-bottom:10px">
      \${[0,1].map(i=>\`<div style="flex:1;padding:7px 10px;border-radius:9px;background:\${C4C[i]};color:#fff;display:flex;justify-content:space-between;align-items:center;opacity:\${current===i?1:.5};transition:opacity .25s"><span style="font-weight:700;font-size:11px">\${names[i]}</span><span style="font-size:18px;font-weight:700">\${scores[i]}</span></div>\`).join('')}
    </div>
    <div style="text-align:center;font-size:11px;color:#7a6040;margin-bottom:8px;font-style:italic">\${names[current]}'s turn — tap a column</div>
    <div class="c4-board">

  const drops=document.getElementById('drops');
  for(let c=0;c<COLS;c++){
    const btn=document.createElement('button');
    btn.className='c4-drop';
    const canDrop=grid[0][c]===null&&!winner;
    btn.textContent=canDrop?'▼':'';
    btn.style.color=C4C[current];
    if(canDrop){btn.onmouseenter=()=>{btn.style.background=C4C[current]+'66';};btn.onmouseleave=()=>{btn.style.background='transparent';};btn.onclick=()=>dropCol(c);}
    drops.appendChild(btn);
  }
  const gridRows=document.getElementById('grid-rows');
  for(let r=0;r<ROWS;r++){
    const row=document.createElement('div');row.className='c4-row';row.style.gridTemplateColumns=\`repeat(\${COLS},1fr)\`;row.style.gap='3px';
    for(let c=0;c<COLS;c++){

      if(grid[r][c]!==null)cell.classList.add('p'+grid[r][c]);
      if(winCells.some(([wr,wc])=>wr===r&&wc===c))cell.classList.add('win');
      cell.style.width=cs+'px';cell.style.height=cs+'px';
      row.appendChild(cell);
    }
    gridRows.appendChild(row);
  }
}
render();

const DM_BOOKS = ["Old Testament", "New Testament", "Book of Mormon", "Doctrine and Covenants"];

function shuffle(a) {
  const r = [...a];
  for (let i = r.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
}

function buildPool(secs) {
  const arr = [];
  DM_BOOKS.forEach(b => {
    if (secs[b+'_first'])  SD[b].firstHalf.forEach(it => arr.push({...it, book:b}));
    if (secs[b+'_second']) SD[b].secondHalf.forEach(it => arr.push({...it, book:b}));
  });
  return arr;
}

let currentPool = [];
let currentQ = null;
let onCorrect = null;
let onWrong = null;

function makeQ(passage) {
  const others = shuffle(currentPool.filter(p => p.ref !== passage.ref));
  const opts = shuffle([passage, ...others.slice(0, 3)]);
  return { passage, opts, correctIdx: opts.findIndex(o => o.ref === passage.ref) };
}

function showToast(msg, ok) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.background = ok ? '#2a6644' : '#c04030';
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = 'none', 2500);
}

const BC = {
  "Old Testament":      { border:"#c8a46e", bg:"#fdf6ec", accent:"#92662a", dot:"#e8c47a" },
  "New Testament":      { border:"#7ea8c9", bg:"#eef5fb", accent:"#2a5f8a", dot:"#90bcd9" },

};

function renderSectionPicker(onPick) {
  const secs = {};
  const div = document.createElement('div');
  div.className = 'screen';
  
  function getCount() { return buildPool(secs).length; }
  
  div.innerHTML = \`
    <h3 style="font-family:Georgia,serif;font-weight:700;font-size:17px;color:#2c1a0e;margin-bottom:14px;text-align:center">Choose Scripture Sections</h3>

      <span id="pool-count" style="background:#2c1a0e;color:#f7f0e0;border-radius:99px;padding:3px 13px;font-size:12px;font-weight:600">0 scriptures</span>
    </div>
    <button class="btn-brown" id="cont-btn" disabled style="opacity:.5;cursor:not-allowed">Continue →</button>
  \`;
  
  const bookList = div.querySelector('#book-list');
  DM_BOOKS.forEach(book => {
    const bc = BC[book];
    const bookDiv = document.createElement('div');
    bookDiv.className = 'card';
    bookDiv.innerHTML = \`
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <div style="width:7px;height:7px;border-radius:50%;background:\${bc.dot}"></div>
        <span style="font-family:Georgia,serif;font-weight:700;font-size:13px">\${book}</span>
      </div>
      <div style="display:flex;gap:6px">
        <button class="section-btn" data-book="\${book}" data-half="first" style="border-color:\${bc.border}">
          <span>1st Half</span><span style="background:#e8dfc8;border-radius:99px;padding:1px 5px;font-size:10.5px">\${SD[book].firstHalf.length}</span>
        </button>
        <button class="section-btn" data-book="\${book}" data-half="second" style="border-color:\${bc.border}">
          <span>2nd Half</span><span style="background:#e8dfc8;border-radius:99px;padding:1px 5px;font-size:10.5px">\${SD[book].secondHalf.length}</span>
        </button>
      </div>
    \`;
    bookList.appendChild(bookDiv);
  });
  
  function update() {
    const n = getCount();
    div.querySelector('#pool-count').textContent = n + ' scriptures';
    div.querySelector('#pool-count').style.background = n > 0 ? '#2c1a0e' : '#c8bfaa';
    const btn = div.querySelector('#cont-btn');
    btn.disabled = n < 4;
    btn.style.opacity = n < 4 ? '.5' : '1';
    btn.style.cursor = n < 4 ? 'not-allowed' : 'pointer';
  }
  
  div.addEventListener('click', e => {
    const btn = e.target.closest('[data-book]');
    if (!btn) return;
    const key = btn.dataset.book + '_' + btn.dataset.half;
    const bc = BC[btn.dataset.book];
    if (secs[key]) {
      delete secs[key];
      btn.classList.remove('on');
      btn.style.background = '#f7f5f0';
      btn.style.color = '#7a6040';
      btn.querySelectorAll('span')[1].style.background = '#e8dfc8';
    } else {
      secs[key] = true;
      btn.classList.add('on');
      btn.style.background = bc.bg;
      btn.style.color = bc.accent;
      btn.style.borderColor = bc.border;
      btn.querySelectorAll('span')[1].style.background = bc.dot + '55';
    }
    update();
  });
  
  div.querySelector('#cont-btn').addEventListener('click', () => {
    if (getCount() >= 4) {
      currentPool = buildPool(secs);
      onPick();
    }
  });
  
  return div;
}

function showQuestion(passage, teamName, teamColor, onC, onW) {
  currentQ = makeQ(passage);
  onCorrect = onC;
  onWrong = onW;
  
  let overlay = document.getElementById('q-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'q-overlay';
    overlay.className = 'q-overlay';
    document.body.appendChild(overlay);
  }
  
  overlay.innerHTML = \`
    <div class="q-modal">
      <div class="q-header" style="background:\${teamColor}">
        <span>\${teamName ? teamName+"'s turn" : 'Question'}</span>
        <button onclick="hideQuestion()">✕</button>
      </div>
      <div class="q-body">
        <div class="q-label">Scripture Reference</div>
        <div class="q-ref">\${passage.ref}</div>
        <div class="q-label">Select the matching key phrase:</div>
        \${currentQ.opts.map((opt,i) => \`<button class="q-opt" onclick="pickAnswer(\${i})"><span style="font-weight:700;margin-right:6px;color:#7a6040">\${String.fromCharCode(65+i)}.</span>\${opt.phrase}</button>\`).join('')}
      </div>
    </div>
  \`;
  overlay.style.display = 'flex';
}

function hideQuestion() {
  const o = document.getElementById('q-overlay');
  if (o) o.style.display = 'none';
}

function pickAnswer(idx) {
  if (!currentQ) return;
  const btns = document.querySelectorAll('.q-opt');
  btns.forEach(b => b.onclick = null);
  btns[currentQ.correctIdx].classList.add('correct');
  if (idx !== currentQ.correctIdx) btns[idx].classList.add('wrong');
  
  const correct = idx === currentQ.correctIdx;
  const q = currentQ;
  currentQ = null;
  setTimeout(() => {
    hideQuestion();
    if (correct) onCorrect && onCorrect();
    else onWrong && onWrong(q.passage);
  }, 1200);
}


const PLC=['#c8a450','#e05c30','#5a8fd4','#5ab88a'];
const SLOT_V=[0,100,300,500,1000,500,300,100,0];
let phase='sections',tc=4,names=['Team 1','Team 2','Team 3','Team 4'];
let scores=[0,0,0,0],cur=0,passPool=[],passIdx=0;
let readyToDrop=false,dropping=false,lastScore=null;
let animId=null;
const BW=300,BH=300,SC=9,BALL_R=9,PEG_R=5,NR=7;
let pegs=[];
function buildPegs(){pegs=[];for(let r=0;r<NR;r++){const cols=r%2===0?8:7;for(let c=0;c<cols;c++){const x=r%2===0?(c+0.5)*BW/8:(c+1)*BW/8;const y=45+r*(BH-70)/NR;pegs.push({x,y});}}}
buildPegs();

function drawBoard(ball,canvas){
  const ctx=canvas.getContext('2d');ctx.clearRect(0,0,BW,BH);
  ctx.fillStyle='#fff';pegs.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,PEG_R,0,Math.PI*2);ctx.fill();});
  const sw=BW/SC;for(let i=1;i<SC;i++){ctx.strokeStyle='rgba(255,255,255,.25)';ctx.beginPath();ctx.moveTo(i*sw,BH-30);ctx.lineTo(i*sw,BH);ctx.stroke();}
  ctx.font='bold 8px sans-serif';ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.65)';
  SLOT_V.forEach((v,i)=>ctx.fillText(v,i*sw+sw/2,BH-5));
  if(ball){ctx.fillStyle=ball.color;ctx.beginPath();ctx.arc(ball.x,ball.y,BALL_R,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1.5;ctx.stroke();}
}

function doDrop(col){
  const sw=BW/SC;const ball={x:col*sw+sw/2,y:12,vx:(Math.random()-.5)*.4,vy:0,color:PLC[cur]};
  dropping=true;render();
  // IMPORTANT: get canvas AFTER render() recreates the DOM
  const canvas=document.getElementById('plinko-canvas');
  if(!canvas){dropping=false;return;}
  function step(){
    ball.vy+=.42;ball.x+=ball.vx;ball.y+=ball.vy;
    for(const p of pegs){const dx=ball.x-p.x,dy=ball.y-p.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<PEG_R+BALL_R){const nx=dx/dist,ny=dy/dist;const dot=ball.vx*nx+ball.vy*ny;ball.vx-=2*dot*nx;ball.vy-=2*dot*ny;ball.vx*=.65;ball.vy*=.65;ball.x=p.x+nx*(PEG_R+BALL_R+1);ball.y=p.y+ny*(PEG_R+BALL_R+1);}}
    if(ball.x<BALL_R){ball.x=BALL_R;ball.vx=Math.abs(ball.vx);}if(ball.x>BW-BALL_R){ball.x=BW-BALL_R;ball.vx=-Math.abs(ball.vx);}
    if(ball.y>BH-BALL_R-5){
      const si=Math.min(SC-1,Math.floor(ball.x/(BW/SC)));const pts=SLOT_V[si]||0;
      scores[cur]+=pts;lastScore={team:cur,pts};dropping=false;readyToDrop=false;
      cur=(cur+1)%tc;render();
      setTimeout(()=>{lastScore=null;render();},2000);
      return;
    }
    drawBoard(ball,canvas);animId=requestAnimationFrame(step);
  }
  animId=requestAnimationFrame(step);
}

function startGame(){passPool=shuffle(currentPool);passIdx=0;scores=Array(tc).fill(0);cur=0;readyToDrop=false;dropping=false;phase='play';render();}

function render(){
  const app=document.getElementById('app');
  if(phase==='sections'){app.innerHTML='';app.appendChild(renderSectionPicker(()=>{phase='names';render();}));return;}
  if(phase==='names'){
    app.innerHTML=\`<div class="screen">

function shuffle(a) {
  const r = [...a];
  for (let i = r.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [r[i], r[j]] = [r[j], r[i]];
  }
  return r;
}

function buildPool(secs) {
  const arr = [];
  DM_BOOKS.forEach(b => {
    if (secs[b+'_first'])  SD[b].firstHalf.forEach(it => arr.push({...it, book:b}));
    if (secs[b+'_second']) SD[b].secondHalf.forEach(it => arr.push({...it, book:b}));
  });
  return arr;
}

let onCorrect = null;
let onWrong = null;

function makeQ(passage) {

}

function hideQuestion() {

function pickAnswer(idx) {
  if (!currentQ) return;
  const btns = document.querySelectorAll('.q-opt');
  btns.forEach(b => b.onclick = null);
  btns[currentQ.correctIdx].classList.add('correct');
  if (idx !== currentQ.correctIdx) btns[idx].classList.add('wrong');
  
  const correct = idx === currentQ.correctIdx;
  const q = currentQ;
  currentQ = null;
  setTimeout(() => {
    hideQuestion();
    if (correct) onCorrect && onCorrect();
    else onWrong && onWrong(q.passage);
  }, 1200);
}

  window.shuffle = shuffle; window.buildPool = buildPool;

    }
